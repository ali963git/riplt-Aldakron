kind = "mobile"
previewPath = "/azkar-mobile/"
title = "الذاكرون — تطبيق الجوال"
version = "1.0.0"
id = "artifacts/azkar-mobile"
router = "expo-domain"

[[services]]
name = "expo"
ensurePreviewReachable = "/status"
paths = [ "/azkar-mobile/" ]
localPort = 19876

[services.development]
run = "pnpm --filter @workspace/azkar-mobile run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/azkar-mobile", "run", "build" ]
run = [ "pnpm", "--filter", "@workspace/azkar-mobile", "run", "serve" ]

[services.env]
PORT = "19876"
BASE_PATH = "/azkar-mobile/"
